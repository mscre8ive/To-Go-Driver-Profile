<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Go Mobility — Custom Flyer Generator</title>
  <style>
    :root {
      --brand-yellow: #dca00c;
      --brand-yellow-dark: #b88204;
      --brand-blue: #0084ff;
      --glass-base: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.03);
      --text-main: #1f2937;
      --text-muted: #6b7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      color: var(--text-main);
    }

    .app-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      width: 100%;
      max-width: 1100px;
      margin: auto;
      align-items: center;
    }

    .control-panel {
      background: var(--glass-base);
      backdrop-filter: blur(20px) saturate(190%);
      -webkit-backdrop-filter: blur(20px) saturate(190%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      box-shadow: var(--glass-shadow);
      padding: 2.5rem;
    }

    .app-title h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .app-title p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .photo-upload-section {
      background: rgba(255, 255, 255, 0.5);
      border: 1px dashed rgba(0, 0, 0, 0.1);
      padding: 1.25rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1rem;
    }

    .avatar-preview-box {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #e2e8f0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .avatar-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-preview-box svg {
      width: 28px;
      height: 28px;
      fill: var(--text-muted);
    }

    .upload-btn-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .btn-upload {
      border: none;
      color: white;
      background: var(--brand-yellow);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-upload:hover { background: var(--brand-yellow-dark); }

    .upload-btn-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }

    .slider-container {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .slider-container label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .zoom-slider {
      width: 100%;
      accent-color: var(--brand-yellow);
      height: 6px;
      border-radius: 3px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .char-counter { color: var(--text-muted); font-weight: normal; }

    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.7);
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--brand-yellow);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(220, 160, 12, 0.15);
    }

    .btn-download {
      width: 100%;
      height: 52px;
      background: var(--brand-yellow);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1.75rem;
      box-shadow: 0 4px 14px rgba(220, 160, 12, 0.3);
      transition: all 0.2s ease;
    }

    .btn-download:hover {
      background: var(--brand-yellow-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(220, 160, 12, 0.4);
    }

    .preview-workspace {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .preview-window-header {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container-frame {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.15);
      background: #cbd5e1;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }

    @media (max-width: 920px) {
      .app-layout {
        grid-template-columns: 1fr;
        gap: 2rem;
        max-width: 500px;
      }
      .control-panel { padding: 1.75rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="app-layout">
  
  <div class="control-panel">
    <div class="app-title">
      <h1>Driver Card Engine</h1>
      <p>Drag image directly on the flyer preview window to reposition.</p>
    </div>

    <div class="photo-upload-section">
      <div class="upload-row">
        <div class="avatar-preview-box" id="avatarBox">
          <svg viewBox="0 0 24 24" id="placeholderIcon"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
          <img id="userAvatar" style="display: none;" src="" alt="Avatar preview" />
        </div>
        <div class="upload-btn-wrapper">
          <button class="btn-upload">Upload Photo</button>
          <input type="file" id="imageLoader" accept="image/*" onchange="handleImage(event)" />
        </div>
      </div>
      
      <div class="slider-container" id="zoomContainer">
        <label for="zoomSlider">Scale Adjuster Image Profile</label>
        <input type="range" id="zoomSlider" class="zoom-slider" min="0.1" max="3" step="0.01" value="1" oninput="adjustZoom(this.value)" />
      </div>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="nameInput">Full Name</label>
        <span class="char-counter"><strong id="nameCount">0</strong>/30</span>
      </div>
      <input type="text" id="nameInput" placeholder="Muhammad Sodiq Sulyman" maxlength="30" oninput="liveUpdate()" />
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="destInput">I Drive To (Destination City)</label>
        <span class="char-counter"><strong id="destCount">0</strong>/20</span>
      </div>
      <input type="text" id="destInput" placeholder="Minna" maxlength="20" oninput="liveUpdate()" />
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="pickInput">Picking Up From (List Cities)</label>
        <span class="char-counter"><strong id="pickCount">0</strong>/45</span>
      </div>
      <input type="text" id="pickInput" placeholder="Ilorin • Jebba • Mokwa • Zungeru • Bida" maxlength="45" oninput="liveUpdate()" />
    </div>

    <button class="btn-download" onclick="downloadFlyer()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Driving Card
    </button>
  </div>

  <div class="preview-workspace">
    <div class="preview-window-header">Live Output Processing</div>
    <div class="canvas-container-frame">
      <canvas id="flyerCanvas" width="1080" height="1080"></canvas>
    </div>
  </div>

</div>

<script>
  const canvas = document.getElementById('flyerCanvas');
  const ctx = canvas.getContext('2d');
  
  const circleX = 710;
  const circleY = 285;
  const radius  = 162; 

  const baseImage = new Image();
  let uploadedImage = null;

  let imgScale = 1.0;
  let imgX = 0;
  let imgY = 0;
  let isDragging = false;
  let startX = 0;
  let startY = 0;

  baseImage.crossOrigin = "anonymous";
  baseImage.onload = () => { renderCanvas(); };
  
  // Updated with your explicit background image target
  baseImage.src = 'togopr.jpg';

  function handleImage(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
      uploadedImage = new Image();
      uploadedImage.onload = function() {
        document.getElementById('placeholderIcon').style.display = 'none';
        const imgEl = document.getElementById('userAvatar');
        imgEl.src = event.target.result;
        imgEl.style.display = 'block';
        document.getElementById('zoomContainer').style.display = 'flex';
        
        imgX = 0;
        imgY = 0;
        
        const aspect = uploadedImage.width / uploadedImage.height;
        if (aspect > 1) {
          imgScale = (radius * 2) / uploadedImage.height;
        } else {
          imgScale = (radius * 2) / uploadedImage.width;
        }
        document.getElementById('zoomSlider').value = imgScale;
        
        renderCanvas();
      }
      uploadedImage.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
  }

  function adjustZoom(val) {
    imgScale = parseFloat(val);
    renderCanvas();
  }

  function liveUpdate() {
    renderCanvas();
    document.getElementById('nameCount').innerText = document.getElementById('nameInput').value.length;
    document.getElementById('destCount').innerText = document.getElementById('destInput').value.length;
    document.getElementById('pickCount').innerText = document.getElementById('pickInput').value.length;
  }

  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  view_dist_offset = 40;
  function startDrag(e) {
    if (!uploadedImage) return;
    const coords = getCanvasCoords(e);
    const dist = Math.sqrt((coords.x - circleX)**2 + (coords.y - circleY)**2);
    if (dist <= radius + view_dist_offset) {
      isDragging = true;
      startX = coords.x - imgX;
      startY = coords.y - imgY;
      e.preventDefault();
    }
  }

  function doDrag(e) {
    if (!isDragging) return;
    const coords = getCanvasCoords(e);
    imgX = coords.x - startX;
    imgY = coords.y - startY;
    renderCanvas();
    e.preventDefault();
  }

  function stopDrag() {
    isDragging = false;
  }

  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('mousemove', doDrag);
  canvas.addEventListener('mouseup', stopDrag);
  canvas.addEventListener('mouseleave', stopDrag);

  canvas.addEventListener('touchstart', startDrag, {passive: false});
  canvas.addEventListener('touchmove', doDrag, {passive: false});
  canvas.addEventListener('touchend', stopDrag);

  function renderCanvas() {
    ctx.clearRect(0, 0, 1080, 1080);
    ctx.drawImage(baseImage, 0, 0, 1080, 1080);

    if (uploadedImage) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(circleX, circleY, radius, 0, Math.PI * 2, true);
      ctx.closePath();
      ctx.clip();

      const drawW = uploadedImage.width * imgScale;
      const drawH = uploadedImage.height * imgScale;
      
      const finalX = circleX - (drawW / 2) + imgX;
      const finalY = circleY - (drawH / 2) + imgY;

      ctx.drawImage(uploadedImage, finalX, finalY, drawW, drawH);
      ctx.restore();
    }

    const valName = document.getElementById('nameInput').value.trim() || "Muhammad Sodiq Sulyman";
    const valDest = document.getElementById('destInput').value.trim() || "Minna";
    const valPick = document.getElementById('pickInput').value.trim() || "Ilorin • Jebba • Mokwa • Zungeru • Bida";

    ctx.textAlign = "left";
    ctx.fillStyle = "#111111";

    // 1. Text Field: Name
    ctx.textBaseline = "middle";
    ctx.font = '700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(valName, 495, 518);

    // 2. Text Field: Destination City
    ctx.textBaseline = "top";
    ctx.font = '500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(valDest, 475, 634);

    // 3. Text Field: Pick Up From
    ctx.textBaseline = "top";
    ctx.font = '500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.fillText(valPick, 475, 735);
  }

  function downloadFlyer() {
    renderCanvas();
    const nameString = document.getElementById('nameInput').value.trim() || 'Driver_Card';
    const downloadLink = document.createElement('a');
    downloadLink.download = 'ToGo_' + nameString.replace(/\s+/g, '_') + '.jpg';
    downloadLink.href = canvas.toDataURL('image/jpeg', 0.95);
    downloadLink.click();
  }
</script>

</body>
</html>
